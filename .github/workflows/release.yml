name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: Miaominal
  BIN_NAME: miaominal
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  build_macos:
    name: Build macOS ${{ matrix.arch_label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch_label: arm64
            artifact_name: Miaominal-macos-arm64
            dmg_name: Miaominal-macos-arm64.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Build macOS app bundle
        run: cargo bundle --release --format osx

      - name: Package DMG
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          bash packaging/macos/build-dmg.sh \
            "target/release/bundle/osx/${APP_NAME}.app" \
            "dist/${{ matrix.dmg_name }}" \
            "${APP_NAME}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.dmg_name }}
          if-no-files-found: error

  build_linux:
    name: Build Linux ${{ matrix.arch_label }} packages
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch_label: x86_64
            artifact_name: Miaominal-linux-x86_64
            appimage_name: Miaominal-linux-x86_64.AppImage
            deb_name: Miaominal-linux-amd64.deb
            rpm_name: Miaominal-linux-x86_64.rpm
            file_arch: x86-64
            deb_arch: amd64
            rpm_arch: x86_64
          - runner: ubuntu-22.04-arm
            arch_label: arm64
            artifact_name: Miaominal-linux-arm64
            appimage_name: Miaominal-linux-arm64.AppImage
            deb_name: Miaominal-linux-arm64.deb
            rpm_name: Miaominal-linux-aarch64.rpm
            file_arch: ARM aarch64
            deb_arch: arm64
            rpm_arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            dpkg-dev \
            elfutils \
            file \
            g++ \
            gcc \
            gettext-base \
            git \
            jq \
            libasound2-dev \
            libdbus-1-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libsecret-1-dev \
            libsqlite3-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            llvm \
            lld \
            make \
            musl-dev \
            musl-tools \
            pipewire \
            pkg-config \
            rpm \
            squashfs-tools \
            xdg-desktop-portal

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux packaging tools
        run: |
          cargo install cargo-bundle --locked
          cargo install cargo-deb --version 3.7.0 --locked
          cargo install cargo-generate-rpm --version 0.21.0 --locked

      - name: Build Linux AppImage
        run: cargo bundle --release --format appimage

      - name: Build Debian package
        run: bash packaging/linux/build-deb.sh --no-build

      - name: Build RPM package
        run: bash packaging/linux/build-rpm.sh --no-build

      - name: Normalize Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          appimage_path="$(find target/release/bundle -type f -name '*.AppImage' -print -quit)"
          deb_path="$(find target/debian -maxdepth 1 -type f -name 'miaominal_*.deb' -print -quit)"
          rpm_path="$(find target/generate-rpm -maxdepth 1 -type f -name 'miaominal-*.rpm' -print -quit)"

          test -n "$appimage_path"
          test -n "$deb_path"
          test -n "$rpm_path"

          rm -rf dist
          mkdir -p dist
          install -m 0755 "$appimage_path" "dist/${{ matrix.appimage_name }}"
          install -m 0644 "$deb_path" "dist/${{ matrix.deb_name }}"
          install -m 0644 "$rpm_path" "dist/${{ matrix.rpm_name }}"

      - name: Verify Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          file "dist/${{ matrix.appimage_name }}" | tee /tmp/miaominal-file.txt
          grep -F "${{ matrix.file_arch }}" /tmp/miaominal-file.txt

          deb_arch="$(dpkg-deb --field "dist/${{ matrix.deb_name }}" Architecture)"
          test "$deb_arch" = "${{ matrix.deb_arch }}"

          rpm_arch="$(rpm -qp --queryformat '%{ARCH}\n' "dist/${{ matrix.rpm_name }}")"
          test "$rpm_arch" = "${{ matrix.rpm_arch }}"

          dpkg-deb --info "dist/${{ matrix.deb_name }}"
          rpm -qip "dist/${{ matrix.rpm_name }}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.appimage_name }}
            dist/${{ matrix.deb_name }}
            dist/${{ matrix.rpm_name }}
          if-no-files-found: error

  build_windows:
    name: Build Windows ${{ matrix.arch_label }} standalone and installer
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            arch_label: x64
            artifact_name: Miaominal-windows-x64
            standalone_name: Miaominal-windows-x64-standalone.exe
            setup_name: Miaominal-windows-x64-setup.exe
            pe_machine: "8664"
          - runner: windows-11-arm
            arch_label: arm64
            artifact_name: Miaominal-windows-arm64
            standalone_name: Miaominal-windows-arm64-standalone.exe
            setup_name: Miaominal-windows-arm64-setup.exe
            pe_machine: "AA64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          $innoCandidates = @(
            (Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6'),
            (Join-Path $env:ProgramFiles 'Inno Setup 6')
          )
          $innoPath = $innoCandidates |
            Where-Object { Test-Path (Join-Path $_ 'ISCC.exe') } |
            Select-Object -First 1
          if (-not $innoPath) {
            choco install innosetup --yes --no-progress
            $innoPath = $innoCandidates |
              Where-Object { Test-Path (Join-Path $_ 'ISCC.exe') } |
              Select-Object -First 1
          }
          if (-not $innoPath) {
            throw 'ISCC.exe was not found after installing Inno Setup.'
          }
          $innoPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm --yes --no-progress
          $nasmPath = Join-Path $env:ProgramFiles 'NASM'
          $env:PATH = "$nasmPath;$env:PATH"
          $nasmPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          nasm -v

      - name: Read app version
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.*)"$').Matches[0].Groups[1].Value
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows release binary
        run: cargo build --release --locked

      - name: Verify Windows binary architecture
        shell: pwsh
        run: |
          $binaryPath = 'target/release/miaominal.exe'
          $bytes = [System.IO.File]::ReadAllBytes($binaryPath)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          $expected = [Convert]::ToUInt16('${{ matrix.pe_machine }}', 16)
          if ($machine -ne $expected) {
            throw ('Unexpected PE machine type 0x{0:X4}; expected 0x{1:X4}.' -f $machine, $expected)
          }
          Write-Output ('Verified PE machine type: 0x{0:X4}' -f $machine)

      - name: Collect standalone artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/miaominal.exe "dist/${{ matrix.standalone_name }}"

      - name: Configure ARM64 installer architecture
        if: matrix.arch_label == 'arm64'
        shell: pwsh
        run: |
          $issPath = 'packaging/windows/Miaominal.iss'
          $content = Get-Content -Raw $issPath
          if ([regex]::Matches($content, '(?m)^ArchitecturesAllowed=x64compatible\r?$').Count -ne 1) {
            throw 'Expected exactly one x64 ArchitecturesAllowed directive before ARM64 replacement.'
          }
          $replacement = "ArchitecturesAllowed=arm64`r`nArchitecturesInstallIn64BitMode=arm64"
          $content = $content.Replace('ArchitecturesAllowed=x64compatible', $replacement)
          $allowedCount = [regex]::Matches($content, '(?m)^ArchitecturesAllowed=arm64\r?$').Count
          $installModeCount = [regex]::Matches($content, '(?m)^ArchitecturesInstallIn64BitMode=arm64\r?$').Count
          if ($allowedCount -ne 1 -or $installModeCount -ne 1 -or $content.Contains('ArchitecturesAllowed=x64compatible')) {
            throw 'Failed to configure the Inno Setup script for ARM64.'
          }
          Set-Content -Path $issPath -Value $content -Encoding utf8 -NoNewline

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          ./packaging/windows/build-inno.ps1 -BinaryPath target/release/miaominal.exe -Version $env:APP_VERSION -OutputPath "dist/${{ matrix.setup_name }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.standalone_name }}
            dist/${{ matrix.setup_name }}
          if-no-files-found: error

  checksums:
    name: Generate release checksums
    runs-on: ubuntu-24.04
    needs:
      - build_macos
      - build_linux
      - build_windows

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: Miaominal-checksums
          path: release-assets/SHA256SUMS
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - checksums
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
